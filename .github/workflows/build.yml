name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend unit & component
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Umbraco.Community.SchemeWeaver/App_Plugins/SchemeWeaver
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Umbraco.Community.SchemeWeaver/App_Plugins/SchemeWeaver/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (for web-test-runner)
        run: npx playwright install chromium

      - name: Build frontend
        run: npm run build

      - name: Unit & component tests
        run: npm test

      - name: Unit & component tests (MSW)
        run: npm run test:msw

  backend:
    name: C# unit & integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Umbraco.Community.SchemeWeaver/App_Plugins/SchemeWeaver/package-lock.json

      # The backend package embeds dist/ as static web assets, so it has
      # to exist before `dotnet build` or the SchemeWeaver csproj won't
      # find its wwwroot content.
      - name: Install frontend dependencies
        working-directory: src/Umbraco.Community.SchemeWeaver/App_Plugins/SchemeWeaver
        run: npm ci

      - name: Build frontend
        working-directory: src/Umbraco.Community.SchemeWeaver/App_Plugins/SchemeWeaver
        run: npm run build

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (unit + integration)
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: '**/TestResults/*.trx'

      - name: Pack
        run: dotnet pack src/Umbraco.Community.SchemeWeaver/Umbraco.Community.SchemeWeaver.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
